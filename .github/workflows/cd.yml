name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Buildprod
        run: ./scripts/buildprod.sh